services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hima-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor # Don't override vendor from host
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    networks:
      - hima-network

  db:
    image: mysql:8.0
    container_name: hima-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-hima_root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-hmsi_niskalarasi}
      MYSQL_USER: ${DB_USERNAME:-hima_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hima_password}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-hima_root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hima-network

  redis:
    image: redis:7-alpine
    container_name: hima-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - hima-network

  phpmyadmin:
    image: phpmyadmin:5
    container_name: hima-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hima-network

volumes:
  db-data:
  redis-data:

networks:
  hima-network:
    driver: bridge
